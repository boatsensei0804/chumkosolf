# docker-compose สำหรับ dev — hot reload ทั้ง backend (air) และ frontend (next dev)
# postgres/redis start ก่อน (healthcheck), migrate รันครั้งเดียว, แล้ว backend/frontend จึงขึ้น
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chumkosoft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chumkosoft_dev_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-chumkosoft}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chumkosoft} -d ${POSTGRES_DB:-chumkosoft}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # object storage (S3-compatible) สำหรับไฟล์แนบส่วนบุคคล (ผลงานครู ฯลฯ)
  # เข้าถึงไฟล์ผ่าน signed URL ที่หมดอายุเท่านั้น (ไม่ใช่ public bucket) ตาม PDPA
  # console UI ที่ http://localhost:9001
  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-chumkosoft}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-chumkosoft_dev_pwd}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      # minio image ไม่มี curl — ใช้ mc (มากับ image) ตรวจความพร้อมแทน
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # รัน migration ครั้งเดียวแยกจากการ start backend (ตาม CLAUDE.md ข้อ 7)
  migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=postgres://${POSTGRES_USER:-chumkosoft}:${POSTGRES_PASSWORD:-chumkosoft_dev_pwd}@postgres:5432/${POSTGRES_DB:-chumkosoft}?sslmode=disable"
      - "up"
    restart: on-failure

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      APP_ENV: development
      HTTP_PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-chumkosoft}:${POSTGRES_PASSWORD:-chumkosoft_dev_pwd}@postgres:5432/${POSTGRES_DB:-chumkosoft}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f}
      # object storage — endpoint ภายใน network ใช้ชื่อ service "minio"
      # public endpoint ใช้สร้าง signed URL ให้เบราว์เซอร์เข้าถึง (ต้องเป็น host ที่เบราว์เซอร์ resolve ได้)
      STORAGE_ENDPOINT: minio:9000
      STORAGE_PUBLIC_ENDPOINT: ${STORAGE_PUBLIC_ENDPOINT:-localhost:9000}
      STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-chumkosoft}
      STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-chumkosoft_dev_pwd}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-chumkosoft-files}
      STORAGE_USE_SSL: "false"
      # face recognition service (สแกนหน้าเข้าเรียน) — เรียกผ่านชื่อ service ใน network
      FACE_SERVICE_URL: http://face-svc:8000
      # เวลาตัด มา/สาย (โซนไทย) — หลังเวลานี้ = สาย
      ATTENDANCE_LATE_AFTER: ${ATTENDANCE_LATE_AFTER:-08:00}
      # ตรวจ liveness (ต้องขยับหน้า) ตอนสแกน: on = เปิด, อื่น ๆ = ปิด (สแกนเฟรมเดียวทันที)
      FACE_LIVENESS: ${FACE_LIVENESS:-off}
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - backend_go_cache:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # บริการคำนวณ embedding ใบหน้า (InsightFace/ArcFace, CPU) สำหรับสแกนหน้าเข้าเรียน
  # backend เรียกใช้แบบ optional — ถ้า service นี้ล่ม backend ยังทำงานปกติ (endpoint สแกนหน้าจะ error)
  face-svc:
    build:
      context: ./face-svc
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api/v1
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_go_cache:
  minio_data:

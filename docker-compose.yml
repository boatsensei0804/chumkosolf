# docker-compose สำหรับ dev — hot reload ทั้ง backend (air) และ frontend (next dev)
# postgres/redis start ก่อน (healthcheck), migrate รันครั้งเดียว, แล้ว backend/frontend จึงขึ้น
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chumko}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chumko_dev_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-chumko}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chumko} -d ${POSTGRES_DB:-chumko}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # รัน migration ครั้งเดียวแยกจากการ start backend (ตาม CLAUDE.md ข้อ 7)
  migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=postgres://${POSTGRES_USER:-chumko}:${POSTGRES_PASSWORD:-chumko_dev_pwd}@postgres:5432/${POSTGRES_DB:-chumko}?sslmode=disable"
      - "up"
    restart: on-failure

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      APP_ENV: development
      HTTP_PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-chumko}:${POSTGRES_PASSWORD:-chumko_dev_pwd}@postgres:5432/${POSTGRES_DB:-chumko}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f}
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - backend_go_cache:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api/v1
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_go_cache:
